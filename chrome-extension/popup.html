<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MB Afiliados</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 380px;
      min-height: 200px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0d0a;
      color: #e8e0d4;
      overflow-x: hidden;
    }

    .header {
      background: linear-gradient(135deg, #1a1510 0%, #0f0d0a 100%);
      border-bottom: 1px solid rgba(196, 162, 101, 0.2);
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #c4a265, #8c6d45);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text h1 {
      font-size: 14px;
      font-weight: 700;
      color: #c4a265;
      letter-spacing: 0.5px;
    }

    .header-text p {
      font-size: 11px;
      color: rgba(196, 162, 101, 0.6);
      margin-top: 2px;
    }

    .content {
      padding: 20px;
    }

    /* Settings Section */
    .settings-section {
      margin-bottom: 16px;
    }

    .settings-section label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: rgba(196, 162, 101, 0.7);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }

    .settings-section input {
      width: 100%;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: #e8e0d4;
      font-size: 12px;
      outline: none;
      transition: border-color 0.2s;
    }

    .settings-section input:focus {
      border-color: rgba(196, 162, 101, 0.4);
    }

    .settings-section input::placeholder {
      color: rgba(255, 255, 255, 0.25);
    }

    /* Capture Button */
    .capture-btn {
      width: 100%;
      padding: 14px 20px;
      background: linear-gradient(135deg, #c4a265, #8c6d45);
      color: #0f0d0a;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
      letter-spacing: 0.3px;
      margin-bottom: 12px;
    }

    .capture-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(196, 162, 101, 0.3);
    }

    .capture-btn:active {
      transform: translateY(0);
    }

    .capture-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
      box-shadow: none;
    }

    .capture-btn .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid rgba(15, 13, 10, 0.3);
      border-top-color: #0f0d0a;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Status Messages */
    .status {
      padding: 10px 14px;
      border-radius: 10px;
      font-size: 12px;
      margin-bottom: 12px;
      display: none;
      align-items: center;
      gap: 8px;
      line-height: 1.4;
    }

    .status.success {
      display: flex;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: #86efac;
    }

    .status.error {
      display: flex;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
    }

    .status.info {
      display: flex;
      background: rgba(59, 130, 246, 0.1);
      border: 1px solid rgba(59, 130, 246, 0.2);
      color: #93c5fd;
    }

    /* Product Preview */
    .preview {
      display: none;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      overflow: hidden;
      margin-bottom: 12px;
    }

    .preview.visible {
      display: block;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .preview-image {
      width: 100%;
      height: 140px;
      object-fit: cover;
      background: rgba(0,0,0,0.3);
    }

    .preview-body {
      padding: 14px;
    }

    .preview-title {
      font-size: 13px;
      font-weight: 600;
      color: #e8e0d4;
      line-height: 1.4;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .preview-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.5);
    }

    .preview-price {
      font-size: 16px;
      font-weight: 700;
      color: #c4a265;
    }

    .preview-origin {
      background: rgba(196, 162, 101, 0.1);
      color: rgba(196, 162, 101, 0.8);
      padding: 2px 8px;
      border-radius: 6px;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* Save Button */
    .save-actions.visible {
      display: flex !important;
    }

    .save-ai-btn {
      width: 100%;
      padding: 12px 20px;
      /* Gradiente Luxo IA: Dourado para um Violeta Profundo */
      background: linear-gradient(135deg, #c4a265 0%, #6366f1 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.2);
    }

    .save-ai-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
      filter: brightness(1.1);
    }

    .save-ai-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
      transform: none;
    }

    .save-btn {
      width: 100%;
      padding: 12px 20px;
      background: rgba(34, 197, 94, 0.1);
      color: #86efac;
      border: 1px solid rgba(34, 197, 94, 0.2);
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s;
    }

    /* Footer */
    .footer {
      padding: 12px 20px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      text-align: center;
    }

    .footer a {
      font-size: 10px;
      color: rgba(196, 162, 101, 0.4);
      text-decoration: none;
    }

    .footer a:hover {
      color: rgba(196, 162, 101, 0.7);
    }

    /* Not supported page warning */
    .page-warning {
      display: none;
      padding: 10px 14px;
      background: rgba(251, 191, 36, 0.08);
      border: 1px solid rgba(251, 191, 36, 0.15);
      border-radius: 10px;
      color: rgba(251, 191, 36, 0.8);
      font-size: 11px;
      margin-bottom: 12px;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="header-icon">🛍️</div>
    <div class="header-text">
      <h1>MB Afiliados</h1>
      <p>Captura de Produtos</p>
    </div>
  </div>

  <div class="content">
    <!-- Settings -->
    <div class="settings-section">
      <label>URL do seu painel</label>
      <input type="text" id="backendUrl" placeholder="https://seusite.vercel.app" />
    </div>
    <div class="settings-section">
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="Cole sua chave aqui" />
    </div>

    <!-- Status -->
    <div class="status" id="statusMsg"></div>

    <!-- Page Warning -->
    <div class="page-warning" id="pageWarning">
      ⚠️ Esta página não é suportada para captura automática. Navegue até a página de um produto na Shopee e tente novamente.
    </div>

    <!-- Capture Button -->
    <button class="capture-btn" id="captureBtn">
      <span>📸</span>
      <span>Capturar Produto</span>
    </button>

    <!-- Product Preview -->
    <div class="preview" id="preview">
      <img class="preview-image" id="previewImage" src="" alt="" />
      <div class="preview-body">
        <div class="preview-title" id="previewTitle"></div>
        <div id="previewExtra" style="display: flex; gap: 8px; margin-bottom: 8px;"></div>
        <div class="preview-meta">
          <span class="preview-price" id="previewPrice"></span>
          <span class="preview-origin" id="previewOrigin"></span>
        </div>
      </div>
    </div>

    <!-- Save Buttons -->
    <div class="save-actions" id="saveActions" style="display: none; flex-direction: column; gap: 10px; margin-top: 4px;">
      <button class="save-btn" id="saveBtn">
        <span>💾</span>
        <span>Salvar no Painel</span>
      </button>

      <button class="save-ai-btn" id="saveWithAiBtn">
        <span>✨</span>
        <span>Salvar + Gerar Post IA</span>
      </button>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="openDashboard">Abrir Painel de Administração →</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
